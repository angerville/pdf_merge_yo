<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고화질 PDF 병합 & 화표 분석기 </title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f0f11; --surface: #1a1a1f; --surface2: #242429; --border: #2e2e36;
    --accent: #7c6ff7; --accent2: #f7a26f; --text: #e8e8f0; --text-muted: #7a7a90;
    --success: #4fd1a5; --danger: #f76f7a; --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 820px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 48px; }
  header h1 { font-family: 'Space Mono', monospace; font-size: 26px; color: var(--accent); margin-bottom: 8px; }
  header p { color: var(--text-muted); font-size: 14px; }

  .steps { display: flex; gap: 8px; margin-bottom: 32px; justify-content: center; }
  .step { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .step.active .step-num { background: var(--accent); border-color: var(--accent); color: white; }
  .step-line { width: 32px; height: 1px; background: var(--border); }

  .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--surface); position: relative; margin-bottom: 16px; }
  .upload-zone:hover { border-color: var(--accent); background: rgba(124,111,247,0.05); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .upload-zone h2 { font-size: 16px; margin-bottom: 6px; }
  .upload-zone p { font-size: 12px; color: var(--text-muted); }

  .file-list { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
  .file-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { background: rgba(124,111,247,0.2); color: var(--accent); border-radius: 99px; padding: 2px 10px; font-size: 11px; }

  .invoice-panel { margin-top: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: none; }
  .inv-table-wrap { overflow-x: auto; margin-top: 10px; }
  table.inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.inv-table th { background: var(--surface2); color: var(--text-muted); padding: 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 11px; }
  table.inv-table td { padding: 10px; border-bottom: 1px solid var(--border); }
  .num { text-align: right; font-family: 'Space Mono', monospace; }
  .total-row td { font-weight: 700; color: var(--accent2); background: rgba(247,162,111,0.06); }

  .actions { margin-top: 24px; display: grid; grid-template-columns: 1fr; gap: 12px; }
  .btn { padding: 16px; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-color { background: linear-gradient(135deg, var(--accent), #a78bfa); color: white; }
  .btn-analyze { background: linear-gradient(135deg, #f7a26f, #f76f7a); color: white; }
  .status-msg { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📄 PDF 병합 + 화표 분석기</h1>
    <p>기안문-화표 대조 및 물품검수서 자동 삽입</p>
  </header>

  <div class="steps">
    <div class="step active" id="step1"><span class="step-num">1</span><span>PDF 업로드</span></div>
    <div class="step-line"></div>
    <div class="step" id="step2"><span class="step-num">2</span><span>화표 분석</span></div>
    <div class="step-line"></div>
    <div class="step" id="step3"><span class="step-num">3</span><span>병합 & 다운로드</span></div>
  </div>

  <div class="upload-zone" id="proposalZone" style="border-color: var(--accent2);">
    <input type="file" accept=".pdf" id="proposalInput">
    <span class="upload-icon">📝</span>
    <h2>1. 기안문(품의서) PDF 업로드</h2>
    <p id="proposalNameDisplay">대조 기준이 될 기안문을 먼저 올려주세요.</p>
  </div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" accept=".pdf" multiple id="fileInput">
    <span class="upload-icon">📂</span>
    <h2>2. PDF 화표 파일 업로드</h2>
    <p>영수증, 거래명세서 등 여러 파일 선택 가능</p>
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="invoice-panel" id="resultPanel">
    <h3>📋 분석 및 대조 결과 <span id="analyzingSpinner" style="display:none">...분석 중</span></h3>
    <div class="inv-table-wrap">
      <table class="inv-table">
        <thead>
          <tr>
            <th>#</th>
            <th>기안문 품명</th>
            <th class="num">기안 금액</th>
            <th>물품명(한글)</th>
            <th>수량</th>
            <th class="num">화표 금액</th>
          </tr>
        </thead>
        <tbody id="invBody"></tbody>
        <tfoot id="invFoot"></tfoot>
      </table>
    </div>
  </div>

  <div class="actions" id="actions" style="display:none">
    <button class="btn btn-analyze" id="btnAnalyze" onclick="analyzeInvoices()">🔍 화표 대조 분석 시작</button>
    <button class="btn btn-color" id="btnMerge" onclick="processCombined()">🚀 병합본 다운로드 (검수서 포함)</button>
  </div>

  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
// ============================================================
// [중요] 물품검수서 자동 삽입용 데이터
// 아래 따옴표 안에 검수서 PDF의 Base64 코드를 넣어주세요.
// ============================================================
const INSPECTION_FORM_BASE64 = ""; // 여기에 코드를 붙여넣으세요

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylZ4DZiWEavuOnJ6jGY9WjWqV-OXocxblLam_KJ5-b-pYhZzeRvjxwH_BOJBp0xwvmaw/exec';
let files = [];
let proposalFile = null;
let invoiceData = [];
const paper = { width: 595.28, height: 841.89 };

// 기안문 업로드 리스너
document.getElementById('proposalInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  proposalFile = { name: file.name, buf: buf };
  document.getElementById('proposalNameDisplay').innerHTML = `✅ 기안문 완료: <strong>${file.name}</strong>`;
});

// 화표 업로드 리스너
document.getElementById('fileInput').addEventListener('change', async (e) => {
  for (const f of e.target.files) {
    const buf = await f.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
    files.push({ name: f.name, buf, pages: pdf.numPages });
  }
  renderList();
});

function renderList() {
  const list = document.getElementById('fileList');
  if (files.length === 0) { list.innerHTML = ''; document.getElementById('actions').style.display = 'none'; return; }
  document.getElementById('actions').style.display = 'grid';
  list.innerHTML = files.map((f, i) => `
    <div class="file-item">
      <span class="file-icon">📄</span>
      <div class="file-info"><div class="file-name">${f.name}</div></div>
      <span class="badge">${i+1}</span>
    </div>
  `).join('');
}

// 화표 분석 로직
async function analyzeInvoices() {
  if (!proposalFile) { alert('기안문을 먼저 업로드해 주세요!'); return; }
  invoiceData = [];
  setStatus('기안문과 화표 대조 분석 중...');
  document.getElementById('resultPanel').style.display = 'block';

  const PROMPT = `당신은 학교 행정 담당자입니다. 앞의 이미지는 기안문, 마지막은 화표입니다. 대조하여 JSON으로 응답하세요.
  { "currency": "CNY", "items": [{ "proposalName": "기안문품명", "proposedAmount": 0, "korean": "화표품명", "qty": 0, "amount": 0 }], "total": 0 }`;

  try {
    // 기안문 이미지 변환 (1페이지)
    const propPdf = await pdfjsLib.getDocument({ data: proposalFile.buf.slice(0) }).promise;
    const propPage = await propPdf.getPage(1);
    const propImg = await pageToB64(propPage);

    for (const file of files) {
      const invPdf = await pdfjsLib.getDocument({ data: file.buf.slice(0) }).promise;
      const invPage = await invPdf.getPage(1);
      const invImg = await pageToB64(invPage);

      const parts = [{ text: PROMPT }, { inlineData: { mimeType: 'image/jpeg', data: propImg } }, { inlineData: { mimeType: 'image/jpeg', data: invImg } }];
      const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ parts }) });
      const data = await res.json();
      let raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
      invoiceData.push(JSON.parse(raw));
    }
    renderTable();
    setStatus('✅ 분석 완료');
  } catch (e) { setStatus('❌ 분석 오류: ' + e.message); }
}

async function pageToB64(page) {
  const vp = page.getViewport({ scale: 1.5 });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
}

function renderTable() {
  const body = document.getElementById('invBody');
  body.innerHTML = '';
  let rowIdx = 1;
  invoiceData.forEach(inv => {
    inv.items.forEach(item => {
      body.innerHTML += `<tr><td>${rowIdx++}</td><td>${item.proposalName}</td><td class="num">${item.proposedAmount}</td><td>${item.korean}</td><td>${item.qty}</td><td class="num">${item.amount}</td></tr>`;
    });
  });
}

// PDF 병합 및 자동 삽입 로직
async function processCombined() {
  setStatus('PDF 생성 중...');
  const finalDoc = await PDFLib.PDFDocument.create();

  // 1. 요약 페이지 (생략 가능하므로 여기선 기안문부터 시작)
  
  // 2. 기안문 삽입
  const propDoc = await PDFLib.PDFDocument.load(proposalFile.buf);
  const propPages = await finalDoc.copyPages(propDoc, propDoc.getPageIndices());
  propPages.forEach(p => finalDoc.addPage(p));

  // 3. 물품검수서 자동 삽입 (내장된 데이터 사용)
  if (INSPECTION_FORM_BASE64) {
    const inspectBytes = Uint8Array.from(atob(INSPECTION_FORM_BASE64), c => c.charCodeAt(0));
    const inspectDoc = await PDFLib.PDFDocument.load(inspectBytes);
    const inspectPages = await finalDoc.copyPages(inspectDoc, inspectDoc.getPageIndices());
    inspectPages.forEach(p => finalDoc.addPage(p));
  }

  // 4. 화표 삽입
  for (const f of files) {
    const invDoc = await PDFLib.PDFDocument.load(f.buf);
    const invPages = await finalDoc.copyPages(invDoc, invDoc.getPageIndices());
    invPages.forEach(p => finalDoc.addPage(p));
  }

  const pdfBytes = await finalDoc.save();
  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `병합본_${new Date().getTime()}.pdf`;
  a.click();
  setStatus('✅ 다운로드 완료');
}

function setStatus(m) { document.getElementById('statusMsg').textContent = m; }
</script>
</body>
</html>
